<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DecodeLabs Rule-Based AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      padding: 20px;
    }
    .container { 
      width: 100%; 
      max-width: 600px; 
      background: white; 
      border-radius: 12px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 700px;
    }
    .header { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      color: white; 
      padding: 24px; 
      text-align: center;
      border-bottom: 3px solid #5568d3;
    }
    .header h1 { 
      font-size: 24px; 
      margin-bottom: 4px; 
      font-weight: 700;
    }
    .header p { 
      opacity: 0.9; 
      font-size: 14px;
      font-weight: 500;
    }
    .chat-box { 
      flex: 1;
      overflow-y: auto; 
      padding: 20px; 
      background: #f7f7f7;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message { 
      display: flex;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .message.bot { 
      justify-content: flex-start; 
    }
    .message.user { 
      justify-content: flex-end; 
    }
    .message-bubble { 
      max-width: 70%; 
      padding: 12px 16px; 
      border-radius: 12px; 
      font-size: 14px; 
      line-height: 1.4;
      word-wrap: break-word;
    }
    .bot .message-bubble { 
      background: #e0e0e0; 
      color: #333; 
      border-radius: 12px 12px 12px 0;
    }
    .user .message-bubble { 
      background: #667eea; 
      color: white; 
      border-radius: 12px 12px 0 12px;
    }
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #e0e0e0;
      border-radius: 12px;
      width: fit-content;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
      animation: typing 1.4s infinite;
    }
    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.5;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }
    .input-area { 
      padding: 16px; 
      border-top: 1px solid #e0e0e0; 
      display: flex; 
      gap: 8px;
      background: white;
    }
    input { 
      flex: 1; 
      padding: 12px; 
      border: 1px solid #ddd; 
      border-radius: 8px; 
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    button { 
      padding: 12px 24px; 
      background: #667eea; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover { 
      background: #5568d3; 
    }
    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 DecodeLabs Chatbot</h1>
      <p>Rule-Based AI Assistant</p>
    </div>
    <div class="chat-box" id="chatBox">
      <div class="message bot">
        <div class="message-bubble">Welcome! I'm a rule-based AI chatbot. Try asking: "hello", "what is ai", "tell me a joke", or "help"</div>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      // Add user message
      addMessage(message, 'user');
      userInput.value = '';
      userInput.focus();

      // Show typing indicator
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message bot';
      typingDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
      chatBox.appendChild(typingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      // Simulate processing delay
      await new Promise(resolve => setTimeout(resolve, Math.random() * 300 + 200));

      // Get bot response
      try {
        // Use relative path but ensure it points to the correct endpoint
        const res = await fetch('/api/chatbot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        
        // Remove typing indicator
        if (chatBox.contains(typingDiv)) {
          chatBox.removeChild(typingDiv);
        }

        if (!res.ok) {
          throw new Error('Server error: ' + res.status);
        }
        
        const data = await res.json();
        
        if (data.response) {
          addMessage(data.response, 'bot');
        } else {
          addMessage('Received unexpected response from server', 'bot');
        }
      } catch (err) {
        console.error('Fetch error:', err);
        // Remove typing indicator
        if (chatBox.contains(typingDiv)) {
          chatBox.removeChild(typingDiv);
        }
        addMessage('Error: ' + err.message + '. Please ensure the server is running.', 'bot');
      }
    }

    function addMessage(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message ' + sender;
      msgDiv.innerHTML = '<div class="message-bubble">' + escapeHtml(text) + '</div>';
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    userInput.focus();
  </script>
</body>
</html>
